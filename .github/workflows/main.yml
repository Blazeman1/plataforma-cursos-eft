name: CI/CD - Plataforma Cursos EFT

on:
  push:
    branches: [ main ]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/plataforma-cursos
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    name: Build y Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar proyecto
        run: mvn clean package -DskipTests -B

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}

  deploy:
    name: Deploy en EC2
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Desplegar en EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_CURSOS_HOST }}
          username: ${{ secrets.EC2_CURSOS_USER }}
          key: ${{ secrets.EC2_CURSOS_SSH_KEY }}
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login \
              -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "=== Creando red Docker si no existe ==="
            sudo docker network create cursos-network 2>/dev/null || echo "Red ya existe"

            echo "=== Verificando RabbitMQ ==="
            if ! sudo docker ps | grep -q rabbitmq-cursos; then
              sudo docker rm -f rabbitmq-cursos 2>/dev/null || true
              sudo docker run -d \
                --name rabbitmq-cursos \
                --restart unless-stopped \
                --network cursos-network \
                -p 5673:5672 \
                -p 15673:15672 \
                -e RABBITMQ_DEFAULT_USER=guest \
                -e RABBITMQ_DEFAULT_PASS=guest \
                rabbitmq:3-management
              echo "RabbitMQ cursos iniciado, esperando 20s..."
              sleep 20
            else
              echo "RabbitMQ ya estaba corriendo"
              sudo docker network connect cursos-network rabbitmq-cursos 2>/dev/null || true
            fi

            echo "=== Deteniendo contenedor anterior ==="
            sudo docker stop plataforma-cursos 2>/dev/null || true
            sudo docker rm plataforma-cursos 2>/dev/null || true

            echo "=== Descargando imagen actualizada ==="
            sudo docker pull ${{ env.DOCKER_IMAGE }}:latest

            echo "=== Ejecutando contenedor Spring Boot ==="
            sudo docker run -d \
              --name plataforma-cursos \
              --restart unless-stopped \
              --network cursos-network \
              -p 8081:8080 \
              -v /mnt/efs:/app/efs \
              -e AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET_CURSOS }} \
              -e AWS_REGION=${{ secrets.AWS_REGION }} \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }} \
              -e EFS_MOUNT_PATH=/app/efs \
              -e AZURE_AD_B2C_JWKS_URI=${{ secrets.AZURE_AD_B2C_JWKS_URI }} \
              -e AZURE_AD_B2C_ISSUER_URI=${{ secrets.AZURE_AD_B2C_ISSUER_URI }} \
              -e RABBITMQ_HOST=rabbitmq-cursos \
              -e RABBITMQ_PORT=5672 \
              -e RABBITMQ_USER=guest \
              -e RABBITMQ_PASS=guest \
              ${{ env.DOCKER_IMAGE }}:latest

            sudo docker image prune -f

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_CURSOS_HOST }}
          username: ${{ secrets.EC2_CURSOS_USER }}
          key: ${{ secrets.EC2_CURSOS_SSH_KEY }}
          script: |
            sleep 45
            curl -f http://localhost:8081/actuator/health || exit 1
            echo "Plataforma Cursos respondiendo correctamente"
